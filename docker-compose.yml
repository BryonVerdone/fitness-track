services:
  fitness-track:
    build: .
    container_name: fitness-track
    restart: unless-stopped
    ports:
      - "8085:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/fitness.db
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - ./data:/data

